name = "intra-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Cron: atualiza notícias às 6h30 BRT (09h30 UTC) de seg a sex
[triggers]
crons = ["30 9 * * 1-5"]

[[d1_databases]]
binding = "DB"
database_name = "intra-db"
database_id = "83cc3359-4703-42a1-95f7-84e68b48347b"

[[d1_databases]]
binding = "PERF_DB"
database_name = "nobel-performance-db"
database_id = "f4642f1c-653b-4e39-8ff2-dbfa3dc24532"

[[kv_namespaces]]
binding = "NOTICIAS_KV"
id = "097ee0db93f94617a16f90892e4e7ec8"

[vars]
CF_ACCESS_AUD = ""
CF_ACCESS_TEAM_DOMAIN = "nobelcapital.cloudflareaccess.com"
INTERNAL_API_SECRET = "dev-perf-secret-2026"
