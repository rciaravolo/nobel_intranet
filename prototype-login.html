<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTRA — Nobel Capital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-left:     #1A1209;
      --bg-right:    #231A0D;
      --card-bg:     #2E2010;
      --card-border: #4A3520;
      --input-bg:    #1A1209;
      --gold-cta-from: #D4A96A;
      --gold-cta-to:   #B8963E;
      --gold-shadow: rgba(212,169,106,0.3);
      --gold-text:   #C9A87C;
      --gold-rule:   #D4A96A;
      --cream:       #F5ECD7;
      --btn-text:    #1A1209;
    }

    html, body {
      height: 100%;
      font-family: 'Geist', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg-left);
    }

    .shell {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* ── LEFT ───────────────────────── */
    .left {
      width: 695px;
      flex-shrink: 0;
      background: var(--bg-left);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      gap: 16px;
      position: relative;
    }

    /* subtle radial glow */
    .left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 30% 50%, rgba(212,169,106,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-wrap {
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .logo-wrap img {
      height: 46px;
      width: auto;
      display: block;
    }

    .headline {
      font-family: 'Lora', serif;
      font-size: 52px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.15;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .rule {
      width: 48px;
      height: 2px;
      background: var(--gold-rule);
      margin-top: 48px;
      position: relative;
      z-index: 1;
    }

    .tagline {
      font-size: 14px;
      color: var(--gold-text);
      font-weight: 400;
      margin-top: 16px;
      opacity: 0.8;
      letter-spacing: 0.02em;
      position: relative;
      z-index: 1;
    }

    /* ── RIGHT ──────────────────────── */
    .right {
      flex: 1;
      background: var(--bg-right);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* subtle grid texture */
    .right::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,169,106,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,169,106,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── CARD ───────────────────────── */
    .card {
      width: 480px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 56px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
    }

    /* gold top accent line on card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 48px; right: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-rule), transparent);
      opacity: 0.6;
    }

    .card-eyebrow {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold-text);
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.7;
    }

    .card-title {
      font-family: 'Lora', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 36px;
      line-height: 1.2;
    }

    /* ── FIELD ──────────────────────── */
    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--gold-text);
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 52px;
      background: var(--input-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      padding: 0 16px;
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 14px;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input::placeholder { color: rgba(201,168,124,0.35); }

    .input-wrap input:focus {
      border-color: var(--gold-cta-from);
      box-shadow: 0 0 0 3px rgba(212,169,106,0.1);
    }

    .input-wrap input.error {
      border-color: #c0392b;
      box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gold-text);
      opacity: 0.5;
      padding: 4px;
      transition: opacity 0.15s;
    }

    .toggle-pw:hover { opacity: 1; }
    .toggle-pw svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; display: block; }

    .error-msg {
      font-size: 12px;
      color: #e74c3c;
      margin-top: 6px;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* ── BUTTONS ────────────────────── */
    .btn-submit {
      width: 100%;
      height: 56px;
      background: linear-gradient(135deg, var(--gold-cta-from) 0%, var(--gold-cta-to) 100%);
      border: none;
      border-radius: 12px;
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--btn-text);
      cursor: pointer;
      margin-top: 28px;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px var(--gold-shadow);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      border-radius: inherit;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(212,169,106,0.4);
    }

    .btn-submit:active { transform: translateY(0); }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-forgot {
      width: 100%;
      height: 52px;
      background: transparent;
      border: 1.5px solid var(--card-border);
      border-radius: 12px;
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--gold-text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-forgot:hover {
      border-color: var(--gold-text);
      background: rgba(212,169,106,0.05);
    }

    /* ── LOADING SPINNER ─────────────── */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(26,18,9,0.3);
      border-top-color: var(--btn-text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-text-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* ── FOOTER ─────────────────────── */
    .card-footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(74,53,32,0.5);
      text-align: center;
      font-size: 12px;
      color: rgba(201,168,124,0.4);
      letter-spacing: 0.03em;
    }

    .card-footer strong { color: rgba(201,168,124,0.6); font-weight: 500; }

    /* ── TOAST ──────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: #1a0a0a;
      border: 1px solid rgba(231,76,60,0.4);
      color: #e74c3c;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: slideUp 0.3s ease;
      z-index: 999;
    }

    .toast.visible { display: flex; }
    .toast.success { background: #0a1a0d; border-color: rgba(34,197,94,0.4); color: #4ade80; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

    <h1 class="headline">INTRA<br>NOBEL</h1>

    <div class="rule"></div>
    <p class="tagline">Sistema interno — Nobel Capital &amp; XP Investimentos</p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="card">
      <p class="card-eyebrow">Acesso restrito</p>
      <h2 class="card-title">Entre na sua conta</h2>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input
              id="username"
              type="text"
              placeholder="seu.nome"
              autocomplete="username"
              required
            />
          </div>
          <p class="error-msg" id="usernameErr">Informe seu username</p>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <div class="input-wrap">
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar senha">
              <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <p class="error-msg" id="passwordErr">Informe sua senha</p>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-text-wrap">
            <span id="btnLabel">Entrar</span>
            <div class="spinner" id="spinner"></div>
          </span>
        </button>

        <button type="button" class="btn-forgot">Esqueci minha senha</button>
      </form>

      <div class="card-footer">
        Acesso disponível apenas para colaboradores<br>
        <strong>Nobel Capital &amp; XP Investimentos</strong>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <span id="toastMsg">Credenciais inválidas</span>
</div>

<script>
  // Mock auth — admin user para testes
  const USERS = {
    'rafael.brandao': 'password123',
  }

  const form       = document.getElementById('loginForm')
  const submitBtn  = document.getElementById('submitBtn')
  const btnLabel   = document.getElementById('btnLabel')
  const spinner    = document.getElementById('spinner')
  const togglePw   = document.getElementById('togglePw')
  const pwInput    = document.getElementById('password')
  const usrInput   = document.getElementById('username')
  const toast      = document.getElementById('toast')
  const toastMsg   = document.getElementById('toastMsg')

  // Toggle password visibility
  togglePw.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password'
    pwInput.type = isHidden ? 'text' : 'password'
    document.getElementById('eyeIcon').innerHTML = isHidden
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
  })

  function showToast(msg, type = 'error') {
    toastMsg.textContent = msg
    toast.className = 'toast visible' + (type === 'success' ? ' success' : '')
    setTimeout(() => { toast.className = 'toast' }, 3500)
  }

  function setLoading(loading) {
    submitBtn.disabled = loading
    btnLabel.style.display = loading ? 'none' : 'inline'
    spinner.style.display  = loading ? 'block' : 'none'
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault()

    const username = usrInput.value.trim()
    const password = pwInput.value

    // clear errors
    document.getElementById('usernameErr').classList.remove('visible')
    document.getElementById('passwordErr').classList.remove('visible')
    usrInput.classList.remove('error')
    pwInput.classList.remove('error')

    let valid = true
    if (!username) {
      document.getElementById('usernameErr').classList.add('visible')
      usrInput.classList.add('error')
      valid = false
    }
    if (!password) {
      document.getElementById('passwordErr').classList.add('visible')
      pwInput.classList.add('error')
      valid = false
    }
    if (!valid) return

    setLoading(true)

    // Simulate network
    await new Promise(r => setTimeout(r, 800))

    const storedPw = USERS[username]
    if (storedPw && storedPw === password) {
      showToast('Login realizado com sucesso!', 'success')
      setTimeout(() => {
        // Redirect to dashboard prototype
        window.location.href = './prototype.html'
      }, 1000)
    } else {
      showToast('Username ou senha incorretos')
      pwInput.value = ''
      pwInput.classList.add('error')
      usrInput.classList.add('error')
      setLoading(false)
    }
  })

  // Clear error on type
  usrInput.addEventListener('input', () => {
    usrInput.classList.remove('error')
    document.getElementById('usernameErr').classList.remove('visible')
  })
  pwInput.addEventListener('input', () => {
    pwInput.classList.remove('error')
    document.getElementById('passwordErr').classList.remove('visible')
  })
</script>
</body>
