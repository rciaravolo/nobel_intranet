name: Deploy Produção

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npm run pages:build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Inspecionar output do build
        run: |
          echo "=== raiz .open-next ==="
          find .open-next -maxdepth 2 -type f | head -30 || echo "não encontrado"
          echo "=== verificar _worker.js ==="
          find .open-next -name "_worker.js" | head -5 || echo "nenhum _worker.js"
          echo "=== verificar worker.js ==="
          find .open-next -name "worker.js" | head -5 || echo "nenhum worker.js"

      - name: Garantir _worker.js no assets
        run: |
          WORKER=$(find .open-next -name "worker.js" | head -1)
          ASSETS=$(find .open-next -type d -name "assets" | head -1)
          if [ -n "$WORKER" ] && [ -n "$ASSETS" ] && [ ! -f "$ASSETS/_worker.js" ]; then
            echo "Copiando $WORKER → $ASSETS/_worker.js"
            cp "$WORKER" "$ASSETS/_worker.js"
          fi

      - name: Deploy Worker (API)
        run: npm run deploy:worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations
        run: npx wrangler d1 migrations apply intra-db
        working-directory: server
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Frontend (Cloudflare Pages)
        run: |
          ASSETS=$(find .open-next -type d -name "assets" | head -1)
          echo "Deploying from: $ASSETS"
          npx wrangler pages deploy "$ASSETS" --project-name=intra --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify production deploy
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚀 *Deploy em produção concluído\!*

            🌐 https://intra-a3y\.pages\.dev

            Commit: `${{ github.sha }}`

      - name: Notify deploy failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🔥 *Deploy em produção FALHOU\!*

            🔍 [Ver logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
