name: Deploy Produção

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npm run pages:build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Listar arquivos do build (para debug)
        if: always()
        run: |
          echo "=== Todos os arquivos relevantes após build ==="
          find . \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" \
            -not -path "*/.next/*" \
            -not -path "*/src/*" \
            -type f 2>/dev/null | sort > /tmp/build-files.txt
          cat /tmp/build-files.txt
          echo ""
          echo "=== Diretórios .open-next ==="
          find . -type d -name ".open-next" 2>/dev/null
          ls -la .open-next/ 2>/dev/null || echo "sem .open-next"
          ls -la .open-next/assets/ 2>/dev/null || echo "sem .open-next/assets"

      - name: Upload artifact de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-listing
          path: /tmp/build-files.txt

      - name: Deploy Worker (API)
        run: npm run deploy:worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations
        run: npx wrangler d1 migrations apply intra-db
        working-directory: server
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Frontend (Cloudflare Pages)
        run: node_modules/.bin/opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify production deploy
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            Deploy em producao concluido!
            https://intra-a3y.pages.dev
            Commit: ${{ github.sha }}

      - name: Notify deploy failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            Deploy em producao FALHOU!
            Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
