name: Deploy Producao

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npm run pages:build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Preparar worker para deploy
        run: |
          cp .open-next/worker.js .open-next/assets/_worker.js
          [ -d .open-next/cloudflare       ] && cp -r .open-next/cloudflare       .open-next/assets/
          [ -d .open-next/middleware       ] && cp -r .open-next/middleware       .open-next/assets/
          [ -d .open-next/.build           ] && cp -r .open-next/.build           .open-next/assets/
          [ -d .open-next/server-functions ] && cp -r .open-next/server-functions .open-next/assets/

      - name: Deploy Worker API
        run: cd server && npx wrangler deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Frontend Pages
        run: npx wrangler pages deploy .open-next/assets --project-name=intra --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
