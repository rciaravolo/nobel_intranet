name: Deploy Produção

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npm run pages:build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Verificar output do build
        run: |
          echo "=== raiz do projeto ==="
          ls -la
          echo ""
          echo "=== .open-next (se existir) ==="
          ls -la .open-next/ 2>/dev/null || echo "NAO EXISTE: .open-next"
          echo ""
          echo "=== .open-next/assets (se existir) ==="
          ls -la .open-next/assets/ 2>/dev/null || echo "NAO EXISTE: .open-next/assets"
          echo ""
          echo "=== _worker.js encontrados ==="
          find . -name "_worker.js" -not -path "*/node_modules/*" 2>/dev/null || echo "nenhum"
          echo ""
          echo "=== worker.js encontrados ==="
          find . -name "worker.js" -not -path "*/node_modules/*" 2>/dev/null || echo "nenhum"

      - name: Validar conteudo dos assets
        run: |
          echo "=== Todos os arquivos em .open-next (recursivo) ==="
          find .open-next -type f 2>/dev/null | sort

          # Verificar se o diretório existe
          test -d .open-next/assets || {
            echo "ERRO: .open-next/assets nao existe!"
            exit 1
          }

          # Contar arquivos
          COUNT=$(find .open-next/assets -type f 2>/dev/null | wc -l)
          echo ""
          echo "Total de arquivos em .open-next/assets: $COUNT"

          # Verificar _worker.js (OBRIGATÓRIO para SSR)
          test -f .open-next/assets/_worker.js || {
            echo "ERRO CRITICO: _worker.js nao existe em .open-next/assets!"
            echo "Arquivos .js em .open-next:"
            find .open-next -name "*.js" 2>/dev/null
            exit 1
          }
          echo "OK: _worker.js presente"

          # Verificar arquivos estáticos
          test -d .open-next/assets/_next || echo "AVISO: sem _next/"

      - name: Deploy Worker (API)
        run: npm run deploy:worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations
        run: npx wrangler d1 migrations apply intra-db
        working-directory: server
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Frontend (Cloudflare Pages)
        run: |
          set -e
          echo "=== Estrutura do build ==="
          ls -la . | grep -v node_modules || true
          ls -la .open-next/ 2>/dev/null && echo "--- .open-next ---" || echo ".open-next NAO EXISTE"
          ls -la .open-next/assets/ 2>/dev/null && echo "--- assets ok ---" || echo ".open-next/assets NAO EXISTE"
          find . -name "_worker.js" -not -path "*/node_modules/*" 2>/dev/null | head -5

          # Tenta os diretórios possíveis em ordem
          DEPLOYED=false
          for dir in ".open-next/assets" ".open-next" ".vercel/output/static" ".cloudflare"; do
            if [ -d "$dir" ]; then
              echo "==> Deploying from: $dir"
              npx wrangler pages deploy "$dir" \
                --project-name=intra \
                --branch=main \
                --commit-dirty=true \
                2>&1
              DEPLOYED=true
              break
            fi
          done

          if [ "$DEPLOYED" = "false" ]; then
            echo "ERRO: Nenhum diretório de output encontrado!"
            ls -la
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify production deploy
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            Deploy em producao concluido!
            https://intra-a3y.pages.dev
            Commit: ${{ github.sha }}

      - name: Notify deploy failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            Deploy em producao FALHOU!
            Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
