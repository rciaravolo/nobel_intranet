name: Deploy Produção

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npm run pages:build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Verificar output do build
        run: |
          echo "=== raiz do projeto ==="
          ls -la
          echo ""
          echo "=== .open-next (se existir) ==="
          ls -la .open-next/ 2>/dev/null || echo "NAO EXISTE: .open-next"
          echo ""
          echo "=== .open-next/assets (se existir) ==="
          ls -la .open-next/assets/ 2>/dev/null || echo "NAO EXISTE: .open-next/assets"
          echo ""
          echo "=== _worker.js encontrados ==="
          find . -name "_worker.js" -not -path "*/node_modules/*" 2>/dev/null || echo "nenhum"
          echo ""
          echo "=== worker.js encontrados ==="
          find . -name "worker.js" -not -path "*/node_modules/*" 2>/dev/null || echo "nenhum"

      - name: Preparar _worker.js para deploy
        run: |
          # @opennextjs/cloudflare gera o worker em .open-next/worker.js
          # Cloudflare Pages precisa de _worker.js na RAIZ do diretório deployado
          echo "=== Estrutura de .open-next ==="
          find .open-next -type f 2>/dev/null | sort

          test -f .open-next/worker.js || {
            echo "ERRO: .open-next/worker.js nao encontrado!"
            exit 1
          }

          test -d .open-next/assets || {
            echo "ERRO: .open-next/assets nao existe!"
            exit 1
          }

          echo "Copiando worker.js → assets/_worker.js"
          cp .open-next/worker.js .open-next/assets/_worker.js

          echo "=== Assets prontos para deploy ==="
          ls -la .open-next/assets/ | head -20

      - name: Deploy Worker (API)
        run: npm run deploy:worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations
        run: npx wrangler d1 migrations apply intra-db
        working-directory: server
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Frontend (Cloudflare Pages)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: intra
          directory: .open-next/assets
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify production deploy
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            Deploy em producao concluido!
            https://intra-a3y.pages.dev
            Commit: ${{ github.sha }}

      - name: Notify deploy failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            Deploy em producao FALHOU!
            Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
